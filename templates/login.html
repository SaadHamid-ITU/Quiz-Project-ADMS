<!DOCTYPE html>
<html>
<head>
    <title>Login - Quiz System</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', 'Segoe UI', sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;

            /* Modern dark-light gradient */
            background: linear-gradient(
                135deg,
                #0f172a 0%,
                #1e293b 25%,
                #334155 50%,
                #6366f1 75%,
                #a855f7 100%
            );

            overflow: hidden;
            position: relative;
        }

        /* Background glowing effects */
        body::before,
        body::after {
            content: "";
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.4;
        }

        body::before {
            width: 320px;
            height: 320px;
            background: #7c3aed;
            top: -100px;
            left: -100px;
        }

        body::after {
            width: 350px;
            height: 350px;
            background: #3b82f6;
            bottom: -120px;
            right: -120px;
        }

        .container {
            width: 420px;
            padding: 45px;

            border-radius: 24px;

            background: rgba(255,255,255,0.08);
            backdrop-filter: blur(18px);

            border: 1px solid rgba(255,255,255,0.15);

            box-shadow:
                0 10px 40px rgba(0,0,0,0.35),
                inset 0 1px 1px rgba(255,255,255,0.1);

            position: relative;
            z-index: 10;
        }

        h2 {
            text-align: center;
            color: white;
            margin-bottom: 35px;
            font-size: 30px;
            font-weight: 700;
            letter-spacing: 1px;
        }

        .subtitle {
            text-align: center;
            color: rgba(255,255,255,0.7);
            margin-top: -20px;
            margin-bottom: 30px;
            font-size: 14px;
        }

        input {
            width: 100%;
            padding: 15px 18px;
            margin: 12px 0;

            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 14px;

            background: rgba(255,255,255,0.08);
            color: white;

            font-size: 15px;
            transition: 0.3s ease;
        }

        input::placeholder {
            color: rgba(255,255,255,0.55);
        }

        input:focus {
            outline: none;

            border-color: #8b5cf6;
            background: rgba(255,255,255,0.12);

            box-shadow:
                0 0 0 4px rgba(139, 92, 246, 0.25),
                0 0 25px rgba(139, 92, 246, 0.3);
        }

        button {
            width: 100%;
            padding: 15px;
            margin-top: 22px;

            border: none;
            border-radius: 14px;

            background: linear-gradient(
                135deg,
                #6366f1,
                #8b5cf6,
                #d946ef
            );

            color: white;
            font-size: 16px;
            font-weight: 600;

            cursor: pointer;
            transition: all 0.3s ease;

            box-shadow: 0 8px 25px rgba(139, 92, 246, 0.35);
        }

        button:hover {
            transform: translateY(-2px) scale(1.01);

            box-shadow:
                0 12px 30px rgba(139, 92, 246, 0.45);
        }

        button:active {
            transform: scale(0.98);
        }

        p {
            text-align: center;
            margin-top: 22px;
            color: rgba(255,255,255,0.75);
            font-size: 14px;
        }

        a {
            color: #c084fc;
            text-decoration: none;
            font-weight: 600;
            transition: 0.3s;
        }

        a:hover {
            color: white;
        }

        .admin-info {
            margin-top: 20px;
            padding: 12px;
            border-radius: 12px;

            background: rgba(255,255,255,0.06);

            font-size: 12px;
            color: rgba(255,255,255,0.7);

            text-align: center;

            border: 1px solid rgba(255,255,255,0.08);
        }

        /* Mobile Responsive */
        @media (max-width: 480px) {
            .container {
                width: 90%;
                padding: 35px 25px;
            }

            h2 {
                font-size: 26px;
            }
        }
    </style>

</head>
<body>
    <div class="container">
        <h2>📚 Quiz System Login</h2>
        <form method="POST">
            <input type="email" name="email" placeholder="Email" required>
            <input type="password" name="password" placeholder="Password" required>
            <button type="submit">Login</button>
        </form>
        <p>Don't have an account? <a href="/register">Register here</a></p>
        <p style="font-size: 12px; margin-top: 20px;">Admin: admin@quiz.com / admin123</p>
    </div>
</body>
</html>
